{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h2>
            Join Tahidi Fresh
        </h2>

        <p>
            Create your account and start ordering.
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                {{ form.username }}
            </div>

            <div class="mb-3">
                {{ form.email }}
            </div>

            <div class="mb-3">
                {{ form.password1 }}
            </div>

            <div class="mb-3">
                {{ form.password2 }}
            </div>

            <div class="mb-3">
                {{ form.phone_number }}
            </div>

            <button class="btn btn-green w-100">

                Create Account

            </button>

        </form>

    </div>

</div>

{% endblock %}
