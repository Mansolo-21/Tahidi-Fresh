{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card auth-card shadow">

            <div class="card-body p-4">

                <h2 class="auth-title text-center">

                    Welcome Back

                </h2>

                <p class="text-center">

                    Login to Tahidi Fresh

                </p>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.username }}

                    <br>

                    {{ form.password }}

                    <br>

                    <button
                        class="btn btn-green w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
