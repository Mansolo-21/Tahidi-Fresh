{% extends "base.html" %}
{% block content %}
<h2>My Shopping Jobs</h2>
<table  class="table">
    <thead>
        <tr>
            <th>Request</th>
            <th>Customer</th>
            <th>Status</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for assignment in assignments%}
        <tr>
            <td>#{{ assignment.request.id}}</td>
            <td> {{assignment.request.customer.username}}</td>
            <td>{{assignment.request.status}}</td>
            <td><a href="{% url 'request_detail' assignment.request.id %}" class="btn btn-primary btn-sm">View</a></td>
        </tr>
        {%empty%}
        <tr>
            <td colspan="4">No assigned shopping jobs.</td>
        </tr>
        {% endfor%}
    </tbody>
</table>
{% endblock%}
