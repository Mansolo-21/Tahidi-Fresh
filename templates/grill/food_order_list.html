{% extends 'base.html' %}

{% block content %}

<h2>
    My Food Orders
</h2>

<table class="table">

    <thead>

        <tr>
            <th>Order</th>
            <th>Status</th>
            <th>Total</th>
            <th>Date</th>
            <th></th>
        </tr>

    </thead>

    <tbody>

        {% for order in orders %}

        <tr>

            <td>
                #{{ order.id }}
            </td>

            <td>
                {{ order.status }}
            </td>

            <td>
                KES {{ order.total_price }}
            </td>

            <td>
                {{ order.created_at }}
            </td>

            <td>

                <a
                    href="{% url 'food_order_detail' order.id %}"
                    class="btn btn-primary btn-sm"
                >
                    View
                </a>

            </td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="5">
                No food orders yet.
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
