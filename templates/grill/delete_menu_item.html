{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Delete Menu Item</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ item.name }}</strong>?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button
            type="submit"
            class="btn btn-danger"
        >
            Delete
        </button>

        <a
            href="{% url 'owner_dashboard' %}"
            class="btn btn-secondary"
        >
            Cancel
        </a>

    </form>

</div>

{% endblock %}
