{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Menu Item</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-success"
        >
            Save Changes
        </button>

        <a
            href="{% url 'owner_dashboard' %}"
            class="btn btn-secondary"
        >
            Cancel
        </a>

    </form>

</div>

{% endblock %}
