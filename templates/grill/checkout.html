{% extends "base.html" %}
{% block content %}
<h2>Checkout</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label >Delivery Address</label>
        {{form.delivery_address}}
    </div>
    <div class="mb-3">
        <label>Notes</label>
        {{ form.notes }}
    </div>
    <button type="submit" 
    class="btn btn-success">Place Order</button>
</form>

{% endblock  %}
